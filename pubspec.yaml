name: stt_logistics_app
description: "STT Logistics — driver verification and shipment management mobile app."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any

  cupertino_icons: ^1.0.8
  get: ^4.7.2
  google_fonts: ^6.2.1
  firebase_core: ^4.12.1
  firebase_analytics: ^12.4.5
  firebase_crashlytics: ^5.2.6
  firebase_performance: ^0.11.4+5

  hive: ^2.2.3
  hive_flutter: ^1.1.0
  crypto: ^3.0.6
  uuid: ^4.5.1
  image_picker: ^1.1.2
  path_provider: ^2.1.5
  path: ^1.9.1
  firebase_messaging: ^16.4.3
  flutter_local_notifications: ^22.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/app_icon.png
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: assets/images/app_icon.png
  web:
    generate: true
    image_path: assets/images/app_icon.png
    background_color: "#000000"
    theme_color: "#06163A"
  remove_alpha_ios: true

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/onboarding/
